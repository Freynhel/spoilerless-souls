<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Background -->
  <rect width="32" height="32" rx="4" fill="#0e0c0a"/>

  <!-- Skull cranium -->
  <ellipse cx="16" cy="13.5" rx="8.5" ry="8" fill="#d6cab6"/>

  <!-- Eye sockets -->
  <ellipse cx="12.5" cy="13" rx="2.5" ry="2.8" fill="#0e0c0a"/>
  <ellipse cx="19.5" cy="13" rx="2.5" ry="2.8" fill="#0e0c0a"/>

  <!-- Nose cavity -->
  <path d="M15 17 Q16 18.2 17 17 L16.8 15.5 Q16 14.8 15.2 15.5 Z" fill="#0e0c0a"/>

  <!-- Jaw / teeth base -->
  <rect x="9" y="19.5" width="14" height="5" rx="1.5" fill="#d6cab6"/>

  <!-- Teeth gaps -->
  <rect x="11.5" y="19.5" width="1.2" height="3.5" rx="0.4" fill="#0e0c0a"/>
  <rect x="14.4" y="19.5" width="1.2" height="3.5" rx="0.4" fill="#0e0c0a"/>
  <rect x="17.3" y="19.5" width="1.2" height="3.5" rx="0.4" fill="#0e0c0a"/>
  <rect x="20.2" y="19.5" width="1.2" height="3.5" rx="0.4" fill="#0e0c0a"/>

  <!-- Eye ember glow -->
  <ellipse cx="12.5" cy="13" rx="1.2" ry="1.4" fill="#e8700a" opacity="0.85"/>
  <ellipse cx="19.5" cy="13" rx="1.2" ry="1.4" fill="#e8700a" opacity="0.85"/>
</svg>